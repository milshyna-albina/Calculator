<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Calculator">
  <title>Calculator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/conventer.css">
  <link rel="stylesheet" href="css/history.css">
</head>

<body>
  <h1>Calculator &lt;3 </h1>

  <div class="calculator">

    <button id="history-button" class="history-toggle">
      <img src="https://cdn-icons-png.flaticon.com/512/3239/3239945.png" alt="History">
    </button>

    <div id="history-panel" class="history-panel hidden">
      <div class="history-header">
        <span class="history-title">History</span>
        <button id="clear-history" title="Clear history">
          <img src="https://cdn-icons-png.flaticon.com/512/1483/1483063.png" alt="Delete" />
        </button>
      </div>
      <div id="history-list">
        <p class="history-empty-msg">Empty</p>
      </div>
    </div>
    <template id="history-template">
      <div class="history-item">
        <div class="history-content">
          <span class="exp"></span>
          <span class="res"></span>
        </div>
        <button class="copy-history-btn" title="Copy result">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9UAniOdD_X49ONH4oex0ly9XdpzheXjOHfA&s" alt="Copy"/>
        </button>
      </div>
    </template>

    <button class="toggle">⋮</button>

    <div class="settings-menu">
      <ul>
        <li data-mode="basic" class="menu-item active">
          Basic <span class="checkmark">✔</span>
        </li>

        <li data-mode="advanced" class="menu-item">
          Advanced <span class="checkmark">✔</span>
        </li>

        <li class="has-submenu">
          ❮ Converters
          <ul class="submenu">
            <li data-converter="length">Length converter<span class="checkmark">✔</span></li>
            <li data-converter="weight">Weight and mass converter<span class="checkmark">✔</span></li>
            <li data-converter="area">Area converter<span class="checkmark">✔</span></li>
          </ul>
        </li>

        <li data-mode="numeral">Numeral system<span class="checkmark">✔</span></li>

      </ul>
    </div>

    <div class="display">
      <div class="calc-lines">
        <div class="input-line"></div>
        <div class="result-line">0</div>
      </div>

      <div class="converter-screen">
        <div class="conv-row from">
          <div class="conv-input" id="inputFrom" tabindex="0">0</div>
          <select class="conv-select" id="unitFrom">
            <option value="mm">mm</option>
            <option value="cm" selected>cm</option>
            <option value="m">m</option>
            <option value="km">km</option>
            <option value="mi">mi</option>
          </select>
        </div>

        <div class="conv-divider">
          <button class="swap-btn" type="button">⮃</button>
        </div>

        <div class="conv-row to">
          <div class="conv-result" id="resultTo">0</div>
          <select class="conv-select" id="unitTo">
            <option value="mm">mm</option>
            <option value="cm">cm</option>
            <option value="m" selected>m</option>
            <option value="km">km</option>
            <option value="mi">mi</option>
          </select>
        </div>
      </div>

      <div class="numeral-screen">
        <div class="conv-row from">
          <div class="conv-input" id="numeralInput" tabindex="0">0</div>
          <select class="conv-select" id="numeralFrom">
            <option value="10">Decimal</option>
            <option value="2">Binary</option>
            <option value="16">Hexadecimal</option>
          </select>
        </div>
        <div class="conv-divider"></div>
        <div class="conv-row to">
          <div class="conv-result" id="numeralResult">0</div>
          <select class="conv-select" id="numeralTo">
            <option value="10">Decimal</option>
            <option value="2">Binary</option>
            <option value="16">Hexadecimal</option>
          </select>
        </div>
      </div>

    </div>

    <div class="grid-basic">
      <button class="but-symb" data-key="C">C</button>
      <button class="but-symb" data-key="+/-">+/-</button>
      <button class="but-symb" data-key="%">%</button>
      <button class="but-symb" data-key="÷">÷</button>

      <button class="but-num" data-key="7">7</button>
      <button class="but-num" data-key="8">8</button>
      <button class="but-num" data-key="9">9</button>
      <button class="but-symb" data-key="×">×</button>

      <button class="but-num" data-key="4">4</button>
      <button class="but-num" data-key="5">5</button>
      <button class="but-num" data-key="6">6</button>
      <button class="but-symb" data-key="-">-</button>

      <button class="but-num" data-key="1">1</button>
      <button class="but-num" data-key="2">2</button>
      <button class="but-num" data-key="3">3</button>
      <button class="but-symb" data-key="+">+</button>

      <button class="but-num" data-key=".">.</button>
      <button class="but-num" data-key="0">0</button>
      <button class="but-long" data-key="=">=</button>
    </div>

    <div class="grid-advanced">
      <div class="mem-row">
        <button class="but-mem" data-key="MC">MC</button>
        <button class="but-mem" data-key="MR">MR</button>
        <button class="but-mem" data-key="M+">M+</button>
        <button class="but-mem" data-key="M-">M-</button>
      </div>

      <button class="but-symb" data-key="C">C</button>
      <button class="but-symb" data-key="(">(</button>
      <button class="but-symb" data-key=")">)</button>
      <button class="but-symb" data-key="%">%</button>
      <button class="but-symb" data-key="÷">÷</button>

      <button class="but-symb" data-key="+/-">+/-</button>
      <button class="but-num" data-key="7">7</button>
      <button class="but-num" data-key="8">8</button>
      <button class="but-num" data-key="9">9</button>
      <button class="but-symb" data-key="×">×</button>

      <button class="but-symb" data-key="!">x!</button>
      <button class="but-num" data-key="4">4</button>
      <button class="but-num" data-key="5">5</button>
      <button class="but-num" data-key="6">6</button>
      <button class="but-symb" data-key="-">-</button>

      <button class="but-symb" data-key="^">xⁿ</button>
      <button class="but-num" data-key="1">1</button>
      <button class="but-num" data-key="2">2</button>
      <button class="but-num" data-key="3">3</button>
      <button class="but-symb" data-key="+">+</button>

      <button class="but-symb" data-key="√">√x</button>
      <button class="but-num" data-key=".">.</button>
      <button class="but-num" data-key="0">0</button>
      <button class="but-long" data-key="=">=</button>
    </div>
  </div>

  <script src="js/basic.js"></script>
  <script src="js/advanced.js"></script>
  <script src="js/numeral_system.js"></script>
  <script src="js/converter.js"></script>
  <script src="js/history.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
